version: '3.8'

services:
  mongodb:
    image: mongo:6.0-alpine
    container_name: sleek_shortener_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: development
    container_name: sleek_shortener_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    # To use the local containerized MongoDB instead of the MongoDB Atlas connection string from .env,
    # uncomment the line below. Note that 'mongodb' is the hostname matching this service.
    # environment:
    #   - MONGO_URI=mongodb://mongodb:27017/sleek_shortener
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: sleek_shortener_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
